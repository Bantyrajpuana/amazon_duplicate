<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment - Amazona</title>
  <style>
    body {
      font-family: Arial;
      background: #f3f3f3;
      margin: 0;
    }

    .container {
      max-width: 400px;
      margin: 60px auto;
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #f7b731;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .success {
      display: none;
      text-align: center;
      color: green;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Fake Payment</h2>

  <form id="paymentForm">
    <input type="text" placeholder="Card Number" required>
    <input type="text" placeholder="Name on Card" required>
    <input type="text" placeholder="Expiry (MM/YY)" required>
    <input type="password" placeholder="CVV" required>

    <button type="submit">Pay Now</button>
  </form>

  <div class="success" id="successMsg">
    ✅ Payment Successful! <br><br>
    Redirecting to home...
  </div>
</div>

<script>
  const form = document.getElementById("paymentForm");
  const successMsg = document.getElementById("successMsg");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    form.style.display = "none";
    successMsg.style.display = "block";

    setTimeout(() => {
      window.location.href = "index.html";
    }, 3000);
  });
</script>

</body>
</html>
